services:
  pg-primary:
    image: postgres:15
    container_name: pg-primary
    environment:
      POSTGRES_USER: admin_monitoreo
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: monitoreo_ambiental
    ports:
      - "5432:5432"
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./init/00-replication.sh:/docker-entrypoint-initdb.d/00-replication.sh
      - ./init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_monitoreo -d monitoreo_ambiental"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  pg-replica1:
    image: postgres:15
    container_name: pg-replica1
    user: postgres
    environment:
      PGPASSWORD: admin123
    ports:
      - "5433:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data
    command: >
      bash -c "
      rm -rf /var/lib/postgresql/data/*;
      until pg_basebackup -h pg-primary -p 5432 -D /var/lib/postgresql/data -U admin_monitoreo -Fp -Xs -P -R;
      do
        echo 'Esperando primaria...';
        sleep 3;
      done;
      chmod 700 /var/lib/postgresql/data;
      exec postgres
      "
    restart: unless-stopped

  pg-replica2:
    image: postgres:15
    container_name: pg-replica2
    user: postgres
    environment:
      PGPASSWORD: admin123
    ports:
      - "5434:5432"
    depends_on:
      pg-primary:
        condition: service_healthy
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data
    command: >
      bash -c "
      rm -rf /var/lib/postgresql/data/*;
      until pg_basebackup -h pg-primary -p 5432 -D /var/lib/postgresql/data -U admin_monitoreo -Fp -Xs -P -R;
      do
        echo 'Esperando primaria...';
        sleep 3;
      done;
      chmod 700 /var/lib/postgresql/data;
      exec postgres
      "
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - pg-primary
    restart: unless-stopped

volumes:
  pg_primary_data:
  pg_replica1_data:
  pg_replica2_data:
